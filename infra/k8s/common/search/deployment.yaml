# Microservicio de búsqueda — Deployment stateless detrás del mismo Ingress que la API.
# El servicio interno escucha en 3001; el Service expone 80 → 3001 para alinearse con api-service.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: proyecto01-restaurante
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
        - name: search
          image: restaurant/search:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch-service:9200"
            - name: API_INTERNAL_URL
              value: "http://api-service"        # Service expone puerto 80 hacia el target 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: proyecto01-restaurante
spec:
  selector:
    app: search
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
