# Copiar este archivo como realm-configmap.yaml en esta misma carpeta antes de
# correr deploy.ps1. No commitear realm-configmap.yaml porque contiene los
# client secrets reales de Keycloak.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: proyecto01-restaurante
data:
  restaurant-realm.json: |
    {
      "realm": "restaurant-realm",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": false,
      "editUsernameAllowed": false,
      "bruteForceProtected": false,
      "accessTokenLifespan": 1800,
      "roles": {
        "realm": [
          {
            "name": "client",
            "description": "Usuario final que consume el catálogo y reserva mesas"
          },
          {
            "name": "restaurant_admin",
            "description": "Dueño/manager que administra restaurantes, menús y órdenes"
          }
        ]
      },
      "clients": [
        {
          "clientId": "restaurant-api",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "<KEYCLOAK_CLIENT_SECRET>",
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["*"],
          "webOrigins": ["*"]
        },
        {
          "clientId": "admin-cli",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "<KEYCLOAK_ADMIN_CLIENT_SECRET>",
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "redirectUris": [],
          "webOrigins": []
        }
      ],
      "users": [
        {
          "username": "service-account-admin-cli",
          "enabled": true,
          "serviceAccountClientId": "admin-cli",
          "clientRoles": {
            "realm-management": [
              "manage-users",
              "view-users",
              "manage-realm",
              "view-realm",
              "query-users",
              "query-realms"
            ]
          }
        }
      ]
    }
