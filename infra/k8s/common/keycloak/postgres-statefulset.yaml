# Postgres EXCLUSIVO de Keycloak. Separado del Postgres de aplicación a propósito:
# - Datos sensibles de auth (realms, users, clients) no se mezclan con datos de negocio.
# - Cada Postgres puede escalar/respaldar/migrar de forma independiente.
# - Si Postgres app cae, Keycloak (y por ende auth) sigue funcionando.
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  namespace: proyecto01-restaurante
spec:
  selector:
    app: keycloak-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-postgres
  namespace: proyecto01-restaurante
spec:
  serviceName: keycloak-postgres
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-postgres
  template:
    metadata:
      labels:
        app: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: keycloak-postgres-secret
          volumeMounts:
            - name: kc-postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "keycloak"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "keycloak"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: kc-postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
