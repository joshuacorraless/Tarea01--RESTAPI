# Mongos — Query Router del sharded cluster.
# Punto de entrada único: la API se conecta acá (mongos-service:27017),
# nunca directo a los shards. Mongos consulta al config server (csrs) para saber
# en qué shard vive cada chunk y rutea las queries.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongos
  template:
    metadata:
      labels:
        app: mongos
    spec:
      containers:
        - name: mongos
          image: mongo:7
          command:
            - mongos
            - "--configdb"
            - "csrs/configsvr-0.configsvr:27017"   # apunta al config server RS, NO a un shard
            - "--bind_ip_all"
            - "--port"
            - "27017"
          ports:
            - containerPort: 27017
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--port"
                - "27017"
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongos-service
spec:
  selector:
    app: mongos
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
