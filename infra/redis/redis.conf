# Configuracion Redis para cache de la API de restaurantes

# Limite de memoria: cuando se alcanza, se aplica la politica de eviccion
maxmemory 128mb

# allkeys-lru: elimina las claves menos usadas recientemente cuando la memoria esta llena
# Es la politica correcta para un cache puro (no hay datos que no puedan perderse)
maxmemory-policy allkeys-lru

# Deshabilitar persistencia: el cache es efimero por diseno
# Si Redis reinicia, la API rellena el cache automaticamente con las primeras peticiones
save ""
appendonly no

# Nivel de log
loglevel notice
