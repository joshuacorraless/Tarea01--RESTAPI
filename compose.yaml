services:
  # =============================================
  # postgresql - base de datos
  # =============================================
  postgres:
    image: postgres:16-alpine
    container_name: restaurant-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      # los archivos en /docker-entrypoint-initdb.d se ejecutan automaticamente
      # al crear la base de datos por primera vez (en orden alfabetico)
      - ./database/00-create-databases.sql:/docker-entrypoint-initdb.d/00-create-databases.sql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/stored-procedures.sql:/docker-entrypoint-initdb.d/02-stored-procedures.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================
  # keycloak - servicio de autenticacion
  # =============================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: restaurant-keycloak
    command: start-dev
    environment:
      # credenciales del admin console de keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # base de datos de keycloak (usa el mismo postgres)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # =============================================
  # mongodb - base de datos documental (fase 4)
  # standalone para dev local; el replica set real va en k8s (paso 4.2)
  # =============================================
  mongo:
    image: mongo:7
    container_name: restaurant-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: restaurant_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # redis - cache de respuestas frecuentes (fase 6)
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: restaurant-redis
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./infra/redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =============================================
  # api - nuestra rest api
  # =============================================
  api:
    build:
      context: ./apps/api
    container_name: restaurant-api
    environment:
      PORT: ${PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      # activar motor mongo: DB_ENGINE=mongo + MONGODB_URI apuntando al servicio
      DB_ENGINE: ${DB_ENGINE:-postgres}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/restaurant_db}
      # redis apunta al servicio interno del compose
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
