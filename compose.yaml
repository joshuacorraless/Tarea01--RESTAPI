services:
  # =============================================
  # postgresql - base de datos
  # =============================================
  postgres:
    image: postgres:16-alpine
    container_name: restaurant-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      # los archivos en /docker-entrypoint-initdb.d se ejecutan automaticamente
      # al crear la base de datos por primera vez (en orden alfabetico)
      - ./database/00-create-databases.sql:/docker-entrypoint-initdb.d/00-create-databases.sql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/stored-procedures.sql:/docker-entrypoint-initdb.d/02-stored-procedures.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================
  # keycloak - servicio de autenticacion
  # =============================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: restaurant-keycloak
    command: start-dev
    environment:
      # credenciales del admin console de keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # base de datos de keycloak (usa el mismo postgres)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # =============================================
  # api - nuestra rest api
  # =============================================
  api:
    build:
      context: ./apps/api
    container_name: restaurant-api
    environment:
      PORT: ${PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =============================================
  # search - servicio de búsqueda
  # =============================================
  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  search:
    build: ./apps/search
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - API_INTERNAL_URL=http://api:3000
    depends_on:
      elasticsearch:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  es_data:
  postgres_data:
