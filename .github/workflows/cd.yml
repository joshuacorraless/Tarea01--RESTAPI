name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api:latest
            ghcr.io/${{ github.repository_owner }}/api:${{ github.sha }}

      - name: Build and push Search image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/search
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/search:latest
            ghcr.io/${{ github.repository_owner }}/search:${{ github.sha }}