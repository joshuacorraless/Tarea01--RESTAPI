# Este archivo define un workflow de GitHub Actions para CI/CD.
#
# ¿Qué es un workflow?
#   Es una serie de pasos automatizados que se ejecutan en respuesta
#   a eventos en el repositorio (push, pull request, merge, etc.)
#
# ¿Cuándo se ejecuta?
#   Se puede configurar para dispararse ante eventos como:
#   - Push a una rama específica (ej: main, develop)
#   - Apertura o merge de un Pull Request
#   - De forma programada (cron)
#
# ¿Qué hace típicamente un pipeline de deploy?
#   1. Checkout del código
#   2. Instalar dependencias
#   3. Correr tests
#   4. Build del proyecto
#   5. Deploy al servidor o proveedor cloud
#
# Todos los workflows de este repositorio viven en .github/workflows/
# y cada archivo .yml representa un pipeline independiente.
